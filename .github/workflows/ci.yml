name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: sidecar
        env:
          # main.py reads these at import time; tests don't make real calls.
          RIOT_API_KEY: test
          GEMINI_API_KEY: test
        run: python -m pytest

  frontend:
    name: Frontend (typecheck, lint, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install dependencies
        # `npm install`, not `npm ci`: the lockfile is generated on Windows, which
        # can't fully enumerate other platforms' transitive optional native deps
        # (rolldown/tailwind-oxide/lightningcss), so strict `npm ci` fails on Linux.
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
